{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h4 class="mb-0 fw-bold">Change Password</h4>
                </div>
                <div class="card-body p-4 bg-white">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">{{ field.label }}</label>
                                {{ field }}
                                {% if field.help_text %}
                                    <small class="form-text text-muted d-block mt-1">{{ field.help_text|safe }}</small>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="text-danger small mt-1 fw-bold">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark btn-lg fw-bold">Update Password</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 border-0">
                    <a href="{% url 'team_profile' %}" class="text-decoration-none text-secondary fw-bold">&laquo; Cancel and Return</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Automatically apply Bootstrap styling to Django form inputs natively.
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            if (input.type !== 'submit' && input.type !== 'hidden') {
                input.classList.add('form-control');
            }
        });
    });
</script>
{% endblock %}
