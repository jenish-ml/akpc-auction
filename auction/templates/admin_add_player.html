{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Add New Player to Database</h2>
    <div class="card shadow-sm p-4 mt-4">
        <form method="POST" action="{% url 'admin_add_player' %}">
            {% csrf_token %}
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Player Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="e.g. LIONEL MESSI">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Position</label>
                    <select name="position" class="form-select" required>
                        <option value="">Select Position...</option>
                        {% for pos_val, pos_label in position_choices %}
                            <option value="{{ pos_val }}">{{ pos_label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Rating</label>
                    <select name="rating" class="form-select" required>
                        <option value="">Select Rating...</option>
                        {% for rating in rating_choices %}
                            <option value="{{ rating }}">{{ rating }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Market Value ($ Millions)</label>
                    <input type="number" step="0.1" name="market_value" class="form-control" required placeholder="e.g. 150">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Assign to Team (Optional)</label>
                <select name="team" class="form-select">
                    <option value="">--- Unassigned (Available for Auction) ---</option>
                    {% for team in teams %}
                        <option value="{{ team.id }}">{{ team.name }} ({{ team.get_league_display }})</option>
                    {% endfor %}
                </select>
                <small class="text-muted">If unassigned, the player will be pushed to the Auction tab.</small>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4 fw-bold">Save Player to Database</button>
                <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
